    <!-- JSON-LD: FAQPage for AI Citability -->

    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is medical tourism in Thailand?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Medical tourism in Thailand involves international patients traveling to Thailand for healthcare services. Thailand is a global leader in medical tourism, offering JCI-accredited hospitals, board-certified specialists, and costs 40-70% lower than Western countries. Bio Connext coordinates the entire journey from specialist matching to post-treatment recovery."
          }
        },
        {
          "@type": "Question",
          "name": "How much does medical treatment cost in Thailand compared to the US?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Medical procedures in Thailand typically cost 40-70% less than in the United States. For example, cardiac surgery may cost $15,000-$25,000 in Thailand versus $70,000-$150,000 in the US. Orthopedic procedures, dental work, and cosmetic surgery offer similar savings, all at JCI-accredited facilities with internationally trained surgeons."
          }
        },
        {
          "@type": "Question",
          "name": "What services does Bio Connext provide for international patients?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Bio Connext provides end-to-end medical concierge services including: specialist doctor matching from 50+ partners, second medical opinions, airport meet-and-greet, VIP medical transport, medical interpretation in 10+ languages, insurance liaison, post-surgery nursing care, accommodation arrangements, and 24/7 multilingual concierge support."
          }
        },
        {
          "@type": "Question",
          "name": "Are hospitals in Thailand internationally accredited?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, Thailand has over 60 JCI (Joint Commission International) accredited hospitals, more than any other country in Asia. Bio Connext partners exclusively with JCI-accredited, ISO 9001:2015 certified, and TEMOS-certified facilities to ensure the highest standards of patient safety and quality of care."
          }
        },
        {
          "@type": "Question",
          "name": "What languages are supported for medical interpretation?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Bio Connext provides professional medical interpretation in over 10 languages including English, Thai, Mandarin Chinese, Japanese, Arabic, Russian, German, French, Korean, and Spanish. Medical interpreters are certified and experienced in healthcare terminology to ensure accurate communication between patients and doctors."
          }
        }
      ]
    }
